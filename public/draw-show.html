<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Aifinik — Draw Show</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, Arial;
        background: #050816;
        color: #eaf0ff;
        overflow: hidden;
      }
      .bg {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            circle at 15% 20%,
            rgba(34, 211, 238, 0.16),
            transparent 55%
          ),
          radial-gradient(
            circle at 85% 70%,
            rgba(14, 165, 233, 0.14),
            transparent 55%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(99, 102, 241, 0.1),
            transparent 60%
          ),
          #050816;
        filter: saturate(1.2);
      }
      canvas#confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      .hud {
        position: fixed;
        left: 18px;
        right: 18px;
        top: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        z-index: 5;
      }
      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: linear-gradient(135deg, #0ea5e9, #22d3ee);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #000;
        font-weight: 900;
      }
      .title {
        font-weight: 900;
        font-size: 18px;
        letter-spacing: 0.3px;
      }
      .sub {
        opacity: 0.75;
        font-size: 12px;
      }
      .btn {
        padding: 10px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: #eaf0ff;
        cursor: pointer;
        font-weight: 700;
      }
      .btnPrimary {
        border: none;
        background: linear-gradient(135deg, #22d3ee, #0ea5e9);
        color: #001018;
      }

      .stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 90px 18px 24px;
        z-index: 4;
      }
      .panel {
        width: min(980px, 100%);
        border-radius: 26px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(2, 6, 23, 0.55);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
        padding: 22px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
      }
      @media (max-width: 880px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .field label {
        display: block;
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 6px;
      }
      .field input,
      .field select {
        width: 100%;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.25);
        color: #fff;
        outline: none;
      }
      .field input:focus,
      .field select:focus {
        border-color: #22d3ee;
      }
      .help {
        font-size: 12px;
        opacity: 0.65;
        margin-top: 8px;
        line-height: 1.35;
      }

      /* SLOT */
      .slot {
        position: relative;
        overflow: hidden;
        height: 210px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.28);
      }
      .slot::before,
      .slot::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 64px;
        z-index: 3;
        pointer-events: none;
      }
      .slot::before {
        top: 0;
        background: linear-gradient(
          to bottom,
          rgba(5, 8, 22, 1),
          rgba(5, 8, 22, 0)
        );
      }
      .slot::after {
        bottom: 0;
        background: linear-gradient(
          to top,
          rgba(5, 8, 22, 1),
          rgba(5, 8, 22, 0)
        );
      }
      .focus {
        position: absolute;
        left: 14px;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        height: 56px;
        border-radius: 18px;
        border: 1px solid rgba(34, 211, 238, 0.65);
        box-shadow:
          0 0 0 2px rgba(34, 211, 238, 0.12) inset,
          0 0 24px rgba(34, 211, 238, 0.12);
        z-index: 4;
      }
      .reel {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        will-change: transform;
      }
      .item {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-monospace, Consolas, monospace;
        font-weight: 1000;
        font-size: 40px;
        letter-spacing: 1px;
        opacity: 0.88;
      }

      /* REVEAL */
      .reveal {
        margin-top: 14px;
        border-radius: 22px;
        padding: 16px;
        border: 1px solid rgba(34, 197, 94, 0.35);
        background: rgba(34, 197, 94, 0.1);
        display: none;
      }
      .place {
        font-weight: 900;
        opacity: 0.9;
      }
      .big {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 52px;
        font-weight: 1100;
        letter-spacing: 1px;
      }
      .meta {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 8px;
        margin-top: 10px;
        font-size: 13px;
      }
      .k {
        opacity: 0.7;
      }
      .hash {
        font-family: ui-monospace, Consolas, monospace;
        opacity: 0.85;
        word-break: break-all;
      }
      .flash {
        position: fixed;
        inset: 0;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 10;
        transition: opacity 120ms ease;
      }
      .shake {
        animation: shake 0.35s ease-in-out 1;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-6px);
        }
        40% {
          transform: translateX(6px);
        }
        60% {
          transform: translateX(-4px);
        }
        80% {
          transform: translateX(4px);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <canvas id="confetti"></canvas>
    <div id="flash" class="flash"></div>

    <div class="hud">
      <div class="brand">
        <div class="logo">A</div>
        <div>
          <div class="title">Aifinik Promo — Розыгрыш</div>
          <div class="sub">
            Показываем победителей по одному, финал — главный приз
          </div>
        </div>
      </div>
      <div
        style="
          display: flex;
          gap: 10px;
          flex-wrap: wrap;
          justify-content: flex-end;
        "
      >
        <button id="btnFS" class="btn">Full Screen</button>
        <button id="btnGo" class="btn btnPrimary">START 🎬</button>
        <button id="btnNext" class="btn">NEXT PRIZE</button>
        <button id="btnResults" class="btn">RESULT</button>
      </div>
    </div>

    <div class="stage">
      <div id="panel" class="panel">
        <div class="grid">
          <div>
            <div class="slot">
              <div class="focus"></div>
              <div id="reel" class="reel"></div>
            </div>

            <div id="reveal" class="reveal">
              <div id="place" class="place">🏆 1 место (Главный приз)</div>
              <div id="ticket" class="big">#0000</div>
              <div class="meta">
                <div class="k">ФИО</div>
                <div id="name">—</div>
                <div class="k">Телефон</div>
                <div id="phone">—</div>
                <div class="k">Код</div>
                <div id="code" class="hash">—</div>
                <div class="k">Audit hash</div>
                <div id="hash" class="hash">—</div>
              </div>
            </div>
          </div>

          <div>
            <div class="field">
              <label>Выбери розыгрыш</label>
              <select id="drawSelect"></select>
              <div class="help">Розыгрыш создаётся в панели (dashboard).</div>
            </div>

            <div class="field" style="margin-top: 12px">
              <label>Сколько секунд крутить 1 победителя?</label>
              <input id="duration" type="number" value="8" min="5" max="18" />
              <div class="help">
                Если призов 3, шоу будет ~ 3×(8 сек) + паузы.
              </div>
            </div>

            <div class="field" style="margin-top: 12px">
              <label>Звук</label>
              <select id="soundMode">
                <option value="on" selected>Включен</option>
                <option value="off">Выключен</option>
              </select>
            </div>

            <div
              id="msg"
              class="help"
              style="margin-top: 12px; color: #a9c7ff"
            ></div>
            <div
              id="board"
              style="margin-top: 14px;
          border-radius: 18px;
          border: 1px solid rgba(255,255,255,.10);
          background: rgba(0,0,0,.18);
          padding: 12px;
          min-height: 140px;
          "
            ><div id="boardRows" style="display: grid; gap: 8px; font-size: 13px; opacity: .9;"></div></div>
            
          </div>
        </div>
      </div>
    </div>

    <script src="js/draw-show.js"></script>
  </body>
</html>
